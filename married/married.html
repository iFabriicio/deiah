<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>XatSpace – Married</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#8751519d,#7a3d3d9f);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CARD */
.married-card{
  width:380px;
  height:520px;
  background:rgba(192,112,112,.95);
  backdrop-filter:blur(22px);
  border-radius:26px;
  position:relative;
  box-shadow:0 18px 35px rgba(120,40,40,.55);
  overflow:hidden;
}

/* BORDE INTERNO */
.married-card::before{
  content:"";
  position:absolute;
  inset:14px;
  border-radius:20px;
  border:1.5px solid rgba(255,255,255,.75);
  pointer-events:none;
}

/* AVATAR */
.avatar-wrap{
  position:absolute;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  width:160px;
  height:160px;
}

.avatar{
  width:100%;
  height:100%;
  border-radius:50%;
  overflow:hidden;
  border:4px solid rgba(255,255,255,.85);
  box-shadow:0 0 30px rgba(255,140,160,.9);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CORAZON */
.married-heart{
  position:absolute;
  right:8px;
  bottom:8px;
  width:40px;
  height:40px;
  border-radius:50%;
  background:linear-gradient(145deg,#ffd6e1,#f4a8b8);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 18px rgba(255,120,140,.9);
}

.married-heart span{
  font-size:18px;
  color:#9c2f42;
}

/* NOMBRE */
.name{
  position:absolute;
  top:215px;
  left:50%;
  transform:translateX(-50%);
  font-family:'Playfair Display',serif;
  font-size:26px;
  color:#f7d4d4;
  letter-spacing:1px;
}

.id{
  position:absolute;
  top:252px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  color:#ffdede;
}

/* MENSAJE */
.message{
  position:absolute;
  top:290px;
  left:50%;
  transform:translateX(-50%);
  width:82%;
  padding:16px;
  text-align:center;
  font-size:15px;
  line-height:1.6;
  color:#fdeef0;
  background:rgba(247,168,168,.45);
  backdrop-filter:blur(12px);
  border-radius:18px;
  box-shadow:0 4px 12px rgba(90,40,40,.3);
}

/* BOTON */
.xatme{
  position:absolute;
  bottom:60px;
  left:50%;
  transform:translateX(-50%);
}

.xatme a{
  padding:8px 28px;
  border-radius:20px;
  background:linear-gradient(145deg,#ffd6e1,#f4a8b8);
  border:1px solid rgba(255,255,255,.75);
  font-size:12px;
  color:#9c2f42;
  text-decoration:none;
  letter-spacing:1px;
  box-shadow:0 0 18px rgba(255,120,140,.8);
  transition:.25s ease;
}

.xatme a:hover{
  transform:scale(1.15);
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:22px;
  left:50%;
  transform:translateX(-50%);
  font-size:9px;
  color:#ffdedeaa;
}


html, body, a, div, span, p, img, button, input, textarea, select, * {
    cursor: none !important;
}

#cursor-corazon {
    position: fixed;
    pointer-events: none;
    z-index: 9999999;
    transform: translate(-50%, -50%);
}

#cursor-corazon::before {
    content: "❤";
    font-size: 24px;
    color: #fa999f;
    text-shadow: 0 0 6px rgba(219, 87, 87, 0.6);
}

.corazon {
    position: fixed;
    pointer-events: none;
    z-index: 2147483647;
    font-size: 16px;
    color: #fa999f;
    animation: flotar 3.5s ease-out forwards;
    text-shadow: 0 0 6px rgba(219, 87, 87, 0.6);
}

@keyframes flotar {
    0% {
        transform: translateY(0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translateY(-120px) scale(1.5);
        opacity: 0;
    }
}

</style>
</head>

<body>
<div id="cursor-corazon"></div>  
<div class="married-card">

  <div class="avatar-wrap">
    <div class="avatar">
      <img src="https://xatimg.com/image/Kg8dj0YKZM9Y.jpg" alt="Pareja">
    </div>
    <div class="married-heart"><span>❤</span></div>
  </div>

  <div class="name">Warren</div>
  <div class="id">1548738197</div>

  <div class="message">
    Eres la forma más bonita que ah tenido la vida que vale la pena arriesgarse a amar.
  </div>

  <div class="xatme">
    <a href="https://xat.me/1548738197" target="_blank">XAT.ME</a>
  </div>

  <div class="footer">✦ XatSpace · Married ✦</div>

</div>

<script>

/* Bloquear clic derecho */
document.addEventListener('contextmenu', function(e){
  e.preventDefault();
});

/* Bloquear selección de texto */
document.addEventListener('selectstart', function(e){
  e.preventDefault();
});

/* Bloquear arrastrar imágenes/texto */
document.addEventListener('dragstart', function(e){
  e.preventDefault();
});


document.addEventListener("mousemove", function(e){

    // cursor
    const c = document.getElementById("cursor-corazon");
    c.style.left = e.clientX + "px";
    c.style.top  = e.clientY + "px";

    // efecto corazón
    const heart = document.createElement("div");
    heart.className = "corazon";
    heart.innerHTML = "❤";
    heart.style.left = e.clientX + "px";
    heart.style.top  = e.clientY + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 3500);
});
</script>

</body>
</html>
